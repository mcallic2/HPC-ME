# Generates the dockerfile for FMS CI testing via this spack config
# To generate the Dockerfile:
# 1. download spack and source a setup script from spack/share
# 2. cd into this directory (FMS/.github/container)
# 3. `spack -e ./ containerize > DockerfileName`
spack:
  specs:
    - gcc@14.2.0
    - mpich@4.1.2
    - bacio@2.6.0
    - cmake@3.31.6
    - g2@3.5.1
    - g2tmpl@1.13.0
    - hdf5@1.14.6
    - jasper@4.2.4
    - libpng@1.6.47
    - netcdf-c@4.9.2
    - netcdf-fortran@4.6.1
    - w3emc@2.12.0
    - zlib-ng@2.2.4
    - libyaml@0.2.5
  concretizer:
    unify: true
    reuse: true
# template file for any extra steps
  config:
    template_dirs:
      - ./
  container:
    format: docker
    # base image
    images:
      os: "rockylinux:9"
      spack: develop
    # strip binaries for size
    strip: true
    template: Dockerfile.template
    # packages we don't need to build from src
    os_packages:
      final:
      - m4
      - libtool
      - pkg-config
      - zip
      - diffutils
      - git
      - libgomp
      - cmake
      - git
    # labels for final image
    labels:
      maintainer: "Caitlyn Mcallister <Caitlyn.Mcallister@noaa.gov>"
      copyright: "2025 GFDL"
      license: "LGPL v3+"
      gov.noaa.gfdl.version: "1.0.0"
      vendor: "Geophysical Fluid Dynamics Laboratory"
      gov.noaa.gfdl.release-date: "2025-02-06"
  compilers:
  - compiler:
      spec: gcc@14.2.0
      paths:
        cc: /usr/bin/gcc
        cxx: /usr/bin/g++
        f77: /usr/bin/gfortran
        fc: /usr/bin/gfortran
      flags: {}
      operating_system: rockylinux9
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []   
